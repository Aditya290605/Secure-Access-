services:
  postgres:
    image: postgres:16-alpine
    container_name: secureaccess-db
    environment:
      POSTGRES_DB: ${DB_NAME:-secureaccess_db}
      POSTGRES_USER: ${DB_USER:-secureaccess}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secureaccess}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-secureaccess} -d ${DB_NAME:-secureaccess_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secureaccess-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: secureaccess_db
      DB_USER: secureaccess
      DB_PASSWORD: secureaccess
      JWT_SECRET: default-dev-secret-change-me-in-production-this-must-be-at-least-256-bits-long
      JWT_EXPIRATION_MS: 86400000
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    container_name: secureaccess-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
